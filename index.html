<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colección de relatos</title>

<style>
body{
  margin:0;
  padding:16px;
  background:#f4efe6;
  font-family:Georgia,"Times New Roman",serif;
  color:#3e2d1f;
}

#coleccion{
  max-width:720px;
  margin:0 auto;
  padding:22px;
  border:2px solid #9b7a4f;
  border-radius:18px;
  background:linear-gradient(180deg,#f8f1df 0%,#ead8b7 100%);
  box-shadow:0 10px 28px rgba(60,40,20,.18);
}

h1{
  text-align:center;
  color:#6f4f2c;
  margin:0 0 10px;
}

.sub{
  text-align:center;
  font-style:italic;
  color:#6b5a48;
  margin-bottom:24px;
}

.story-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.story-item{
  padding:12px 14px;
  border-radius:12px;
  background:rgba(255,255,255,.45);
  border:1px solid rgba(90,66,41,.25);
}

.story-item a{
  color:#5b4229;
  font-weight:700;
  text-decoration:none;
}

.story-item a:hover{
  text-decoration:underline;
}

.locked{
  color:#8a7a67;
  font-style:italic;
}

.back{
  text-align:center;
  margin-top:24px;
}

.back a{
  color:#6f4f2c;
  font-style:italic;
  text-decoration:none;
}

.back a:hover{
  text-decoration:underline;
}

#aiGame{
  margin-top:24px;
  padding:16px;
  border-radius:14px;
  background:rgba(255,255,255,.45);
  border:1px solid rgba(90,66,41,.25);
  line-height:1.5;
}

.ai-option{
  display:block;
  margin:8px 0;
}

.ai-btn{
  margin-top:12px;
  border:1px solid #6f4f2c;
  background:linear-gradient(180deg,#a67b45,#7f5c34);
  color:#fff8e8;
  padding:8px 16px;
  border-radius:999px;
  font-family:Georgia,"Times New Roman",serif;
  font-weight:700;
  cursor:pointer;
}

.extra-link{
  margin-top:14px;
  text-align:center;
}

.extra-link a{
  color:#6f4f2c;
  font-style:italic;
  text-decoration:none;
}

.extra-link a:hover{
  text-decoration:underline;
}

.experiments{
  text-align:center;
  margin-top:24px;
}

.experiments-title{
  margin-bottom:10px;
  font-size:1.15em;
  font-weight:bold;
  color:#6f4f2c;
}
  
</style>
</head>

<body>
<div id="coleccion">
  <h1>Colección de relatos</h1>

  <div class="sub" id="counter"></div>

  <div class="story-list" id="storyList"></div>

  <div id="aiGame" style="display:none;"></div>

  <div class="back">
    <a href="index.html">Volver al sudoku</a>
  </div>
</div>

<script>
(function(){

  var STORIES_KEY = "coleccion_relatos_leidos_v1";
  var GUESS_KEY = "sudoku_literario_eleccion_ia_v1";
  var EXTRA_STORY_KEY = "sudoku_literario_relato_extra_v1";
  var SECRET_READ_KEY = "sudoku_literario_el_secreto_leido_v1";

  var STORIES = [
  { id:"easy_1", title:"Los amigos", file:"los-amigos.html" },
  { id:"easy_2", title:"La llave", file:"la-llave.html" },
  { id:"medium_1", title:"El fantasma", file:"el-fantasma.html" },
  { id:"medium_2", title:"El hermano", file:"el-hermano.html" },
  { id:"hard_1", title:"El crucero", file:"el-crucero.html" },
  { id:"hard_2", title:"El profesor", file:"el-profesor.html" },
  { id:"secret_1", title:"El secreto", file:"el-secreto.html", secret:true }
];

  function loadUnlockedStories(){
    try{
      var raw = localStorage.getItem(STORIES_KEY);
      if(!raw) return {};
      return JSON.parse(raw) || {};
    }catch(e){
      return {};
    }
  }

function saveGuess(value){
  try{
    localStorage.setItem(GUESS_KEY, value);
    localStorage.setItem(EXTRA_STORY_KEY, "true");
  }catch(e){}
}

function loadGuess(){
  try{
    return localStorage.getItem(GUESS_KEY);
  }catch(e){
    return null;
  }
}

function renderAIGame(allDiscovered){
  var box = document.getElementById("aiGame");

  if(!allDiscovered){
    box.style.display = "none";
    return;
  }

  var guess = loadGuess();

  if(guess){

  if(hasReadSecret()){
    box.innerHTML =
  '<div class="experiments">' +
      '<p class="experiments-title">Experimentos literarios</p>' +
      '<div class="extra-link">' +
        '<a href="el-juego-de-la-ia.html">El juego de la IA</a>' +
      '</div>' +
    '</div>';
  }else{
    box.innerHTML =
      '<p><strong>Tu respuesta ha quedado registrada.</strong></p>' +
      '<p>Lee este último relato y sabrás si has acertado.</p>' +
      '<div class="extra-link"><a href="el-secreto.html">Continuar...</a></div>';
  }

  box.style.display = "block";
  return;
}

  var html =
    '<p><strong>Uno de estos relatos lo ha escrito una IA.</strong><br>' +
    '¿Cuál crees que es?</p>';

  for(var j=0; j<STORIES.length; j++){
    html +=
      '<label class="ai-option">' +
      '<input type="radio" name="aiGuess" value="' + STORIES[j].id + '"> ' +
      STORIES[j].title +
      '</label>';
  }

  html += '<button class="ai-btn" id="submitGuessBtn" type="button">Enviar respuesta</button>';

  box.innerHTML = html;
  box.style.display = "block";

  document.getElementById("submitGuessBtn").onclick=function(){
    var selected = document.querySelector('input[name="aiGuess"]:checked');

    if(!selected){
      alert("Elige un relato antes de enviar tu respuesta.");
      return;
    }

    saveGuess(selected.value);
    renderAIGame(true);
  };
}

  function hasReadSecret(){
    try{
      return localStorage.getItem(SECRET_READ_KEY) === "true";
    }catch(e){
      return false;
    }
  }
  
  function render(){
  var unlockedStories = loadUnlockedStories();
  var discovered = 0;
  var html = "";
  var secretRead = hasReadSecret();
  var totalVisible = secretRead ? STORIES.length : STORIES.length - 1;

  for(var i=0; i<STORIES.length; i++){
    var story = STORIES[i];

    if(story.secret && !secretRead){
      continue;
    }

    var unlocked;

    if(story.secret){
      unlocked = secretRead;
    }else{
      unlocked = unlockedStories[story.id];
    }

    if(unlocked){
      discovered++;
      html += '<div class="story-item">✓ <a href="' + story.file + '">' +
              story.title +
              '</a></div>';
    }else{
      html += '<div class="story-item"><a href="' + story.file + '">' +
              story.title +
              '</a></div>';
    }
  }

  document.getElementById("counter").textContent =
    "Has leído " + discovered + " de " + totalVisible + " relatos.";

  document.getElementById("storyList").innerHTML = html;

  renderAIGame(discovered >= 6);
}

  render();

})();
</script>
</body>
</html>
