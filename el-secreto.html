<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El secreto</title>

<style>
body{
  margin:0;
  padding:18px;
  background:#f4efe6;
  font-family:Georgia,"Times New Roman",serif;
  color:#3e2d1f;
}

.container{
  max-width:560px;
  margin:0 auto;
  padding:18px;
  border:2px solid #9b7a4f;
  border-radius:18px;
  background:linear-gradient(180deg,#f8f1df 0%,#ead8b7 100%);
  box-shadow:0 10px 28px rgba(60,40,20,.18);
}

h1{
  text-align:center;
  color:#6f4f2c;
  margin:0 0 18px;
}

.chat{
  background:#efe6d4;
  border-radius:16px;
  padding:14px;
}

.time{
  text-align:center;
  font-size:.78rem;
  color:#6b5a48;
  margin:12px 0;
}

.msg{
  max-width:78%;
  padding:8px 10px;
  margin:6px 0;
  border-radius:12px;
  line-height:1.35;
  font-family:Arial, sans-serif;
  font-size:.96rem;
  box-shadow:0 1px 2px rgba(0,0,0,.12);
}

.in{
  background:#fff;
  margin-right:auto;
  border-top-left-radius:4px;
}

.out{
  background:#d9fdd3;
  margin-left:auto;
  border-top-right-radius:4px;
}

.name{
  display:block;
  font-size:.72rem;
  font-weight:bold;
  color:#6f4f2c;
  margin-bottom:3px;
}

.nav{
  margin-top:26px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.nav a{
  color:#6f4f2c;
  text-decoration:none;
  font-style:italic;
}

.nav a:hover{
  text-decoration:underline;
}

.typing{
  max-width:78%;
  padding:8px 10px;
  margin:6px 0;
  border-radius:12px;
  background:#fff;
  color:#777;
  font-family:Arial,sans-serif;
  font-size:.9rem;
  font-style:italic;
}

.checks{
  color:#34b7f1;
  font-size:.78rem;
}
  
</style>
</head>

<body>

<div class="container">

<h1>El secreto</h1>

<div class="chat" id="chat"></div>

<div id="storyNav" class="nav"></div>

<script>
try{
  localStorage.setItem("sudoku_literario_el_secreto_leido_v1","true");
}catch(e){}

var SECRET_SEEN_KEY = "el_secreto_visto_v1";
  
var secretRead =
  localStorage.getItem("sudoku_literario_el_secreto_leido_v1") === "true";

var alreadySeen =
  localStorage.getItem(SECRET_SEEN_KEY) === "true";

var messages = [
  {type:"time", text:"09:12"},
  {from:"in", name:"Laura", text:"¿Lo has leído?"},
  {from:"out", text:"Sí."},
  {from:"in", name:"Laura", text:"¿Y?"},
  {from:"out", text:"No sé."},
  {from:"in", name:"Laura", text:"¿No sabes qué?"},
  {from:"out", text:"Si lo escribió una persona o una máquina."},

  {type:"time", text:"09:18"},
  {from:"in", name:"Laura", text:"Yo creo que fue una persona."},
  {from:"out", text:"¿Por qué?"},
  {from:"in", name:"Laura", text:"Porque me emocionó."},
  {from:"out", text:"Eso no demuestra nada."},
  {from:"in", name:"Laura", text:"Ya lo sé."},

  {type:"time", text:"09:24"},
  {from:"out", text:"¿Y si no importara?"},
  {from:"in", name:"Laura", text:"¿El qué?"},
  {from:"out", text:"Quién lo escribió."},
  {from:"in", name:"Laura", text:"Claro que importa."},
  {from:"out", text:"¿Estás segura?"},

  {type:"time", text:"09:31"},
  {from:"in", name:"Laura", text:"Entonces, ¿cuál es el secreto?"},
  {from:"out", text:"Que mientras lo leías no te lo preguntabas."},
  {from:"in", name:"Laura", text:"..."},
  {from:"out", text:"Solo estabas leyendo."}
];

var chat = document.getElementById("chat");
var nav = document.getElementById("storyNav");
nav.style.display = "none";

function addTyping(callback){
  var typing = document.createElement("div");
  typing.className = "typing";
  typing.textContent = "Laura está escribiendo...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
  scrollToBottom();

  setTimeout(function(){
    typing.remove();
    callback();
  }, 2000);
}

function addMessage(item){
  if(item.type === "time"){
    var time = document.createElement("div");
    time.className = "time";
    time.textContent = item.text;
    chat.appendChild(time);
    return;
  }

  var msg = document.createElement("div");
  msg.className = "msg " + item.from;

  var html = "";

  if(item.name){
    html += '<span class="name">' + item.name + '</span>';
  }

  html += item.text;

  if(item.from === "out"){
    html += ' <span class="checks">✓✓</span>';
  }

  msg.innerHTML = html;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  scrollToBottom();
}

function scrollToBottom(){
  setTimeout(function(){
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: "smooth"
    });
  }, 80);
}  

var index = 0;

function renderWholeChat(){

  for(var i=0; i<messages.length; i++){
    addMessage(messages[i]);
  }

  nav.style.display = "flex";
}
  
function playNext(){
  if(index >= messages.length){
    setTimeout(function(){
      nav.style.display = "flex";
    }, 5000);
    return;
  }

  var item = messages[index];
  index++;

  if(item.from === "in"){
    addTyping(function(){
      addMessage(item);
      setTimeout(playNext, 2000);
    });
  }else{
    addMessage(item);
    setTimeout(playNext, item.type === "time" ? 1500 : 2000);
  }
}

if(alreadySeen){
  renderWholeChat();
}else{
  localStorage.setItem(SECRET_SEEN_KEY,"true");
  playNext();
}

if(secretRead){
  nav.innerHTML =
    '<a href="el-profesor.html">← Anterior</a>' +
    '<a href="index.html">Colección</a>' +
    '<a href="los-amigos.html">Siguiente →</a>';
}else{
  nav.innerHTML =
    '<span></span>' +
    '<a href="index.html">Colección</a>' +
    '<span></span>';
}
</script>

</body>
</html>
